<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Prompt documents case visual</title>
  <desc id="desc">Two prompt documents generated by the skill.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff7ed"/><stop offset="1" stop-color="#f0f9ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#111827" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="72" y="86" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">案例二：自动生成两类提示词文档</text>
  <text x="72" y="124" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">既能指导 PPT 内容策划，也能指导图像模型逐页生成视觉稿</text>
  <g filter="url(#shadow)">
    <rect x="110" y="178" width="430" height="390" rx="24" fill="#ffffff"/>
    <rect x="110" y="178" width="430" height="72" rx="24" fill="#2563eb"/>
    <text x="144" y="223" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">PPT完整提示词</text>
    <text x="146" y="294" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">每页包含</text>
    <rect x="146" y="322" width="320" height="12" rx="6" fill="#bfdbfe"/>
    <rect x="146" y="354" width="260" height="12" rx="6" fill="#bfdbfe"/>
    <rect x="146" y="386" width="344" height="12" rx="6" fill="#bfdbfe"/>
    <rect x="146" y="438" width="112" height="44" rx="12" fill="#eff6ff"/><text x="202" y="466" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" fill="#1d4ed8">页面目标</text>
    <rect x="276" y="438" width="112" height="44" rx="12" fill="#eff6ff"/><text x="332" y="466" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" fill="#1d4ed8">页面文案</text>
    <rect x="406" y="438" width="92" height="44" rx="12" fill="#eff6ff"/><text x="452" y="466" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" fill="#1d4ed8">讲稿点</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="660" y="178" width="430" height="390" rx="24" fill="#ffffff"/>
    <rect x="660" y="178" width="430" height="72" rx="24" fill="#0f766e"/>
    <text x="694" y="223" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="24" font-weight="800" fill="#ffffff">逐页AI绘图Prompt</text>
    <text x="696" y="294" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#0f172a">每页包含</text>
    <rect x="696" y="322" width="322" height="12" rx="6" fill="#99f6e4"/>
    <rect x="696" y="354" width="276" height="12" rx="6" fill="#99f6e4"/>
    <rect x="696" y="386" width="344" height="12" rx="6" fill="#99f6e4"/>
    <rect x="696" y="438" width="112" height="44" rx="12" fill="#ecfdf5"/><text x="752" y="466" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" fill="#047857">核心画面</text>
    <rect x="826" y="438" width="112" height="44" rx="12" fill="#ecfdf5"/><text x="882" y="466" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" fill="#047857">关键词</text>
    <rect x="956" y="438" width="92" height="44" rx="12" fill="#ecfdf5"/><text x="1002" y="466" text-anchor="middle" font-family="Microsoft YaHei" font-size="15" fill="#047857">负面词</text>
  </g>
  <path d="M558 372h84" stroke="#fb923c" stroke-width="8" stroke-linecap="round" stroke-dasharray="8 16"/>
</svg>
