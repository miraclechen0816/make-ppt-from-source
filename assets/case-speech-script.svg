<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Speech script case visual</title>
  <desc id="desc">A visual example of a generated presentation speech script.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#fefce8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity="0.15"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="72" y="86" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="36" font-weight="800" fill="#111827">案例三：基于最终PPT生成配套演讲稿</text>
  <text x="72" y="124" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">不是照读页面，而是补足逻辑、转场、时间分配与评审问答</text>
  <g filter="url(#shadow)">
    <rect x="94" y="188" width="330" height="330" rx="24" fill="#ffffff"/>
    <rect x="126" y="226" width="266" height="150" rx="16" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="150" y="252" width="112" height="16" rx="8" fill="#2563eb"/>
    <rect x="150" y="286" width="190" height="10" rx="5" fill="#bfdbfe"/>
    <rect x="150" y="312" width="160" height="10" rx="5" fill="#bfdbfe"/>
    <rect x="150" y="338" width="214" height="10" rx="5" fill="#bfdbfe"/>
    <text x="259" y="442" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" font-weight="800" fill="#0f172a">最终PPT页序</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="486" y="156" width="370" height="396" rx="24" fill="#ffffff"/>
    <rect x="526" y="210" width="214" height="18" rx="9" fill="#0f172a"/>
    <rect x="526" y="260" width="278" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="526" y="288" width="240" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="526" y="316" width="292" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="526" y="360" width="110" height="38" rx="12" fill="#fef3c7"/><text x="581" y="385" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#92400e">转场语</text>
    <rect x="654" y="360" width="110" height="38" rx="12" fill="#dcfce7"/><text x="709" y="385" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" fill="#166534">时间分配</text>
    <rect x="526" y="432" width="292" height="10" rx="5" fill="#cbd5e1"/>
    <rect x="526" y="460" width="260" height="10" rx="5" fill="#cbd5e1"/>
    <text x="671" y="516" text-anchor="middle" font-family="Microsoft YaHei" font-size="20" font-weight="800" fill="#0f172a">逐页讲稿 + 完整口播</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="914" y="204" width="220" height="286" rx="24" fill="#111827"/>
    <text x="1024" y="254" text-anchor="middle" font-family="Microsoft YaHei" font-size="22" font-weight="800" fill="#fff">Q&A</text>
    <rect x="950" y="294" width="148" height="12" rx="6" fill="#fbbf24"/>
    <rect x="950" y="326" width="118" height="12" rx="6" fill="#fde68a"/>
    <rect x="950" y="380" width="148" height="12" rx="6" fill="#60a5fa"/>
    <rect x="950" y="412" width="100" height="12" rx="6" fill="#bfdbfe"/>
    <text x="1024" y="535" text-anchor="middle" font-family="Microsoft YaHei" font-size="17" font-weight="700" fill="#334155">评审问答准备</text>
  </g>
  <path d="M434 350h42M866 350h38" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
